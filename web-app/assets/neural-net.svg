<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="nn1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="nn2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="nnglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Neural connections -->
  <g stroke="url(#nn1)" stroke-width="1" fill="none" opacity="0.4">
    <!-- Input to Hidden1 -->
    <line x1="100" y1="100" x2="300" y2="80"/><line x1="100" y1="100" x2="300" y2="180"/>
    <line x1="100" y1="100" x2="300" y2="280"/><line x1="100" y1="100" x2="300" y2="380"/>
    <line x1="100" y1="100" x2="300" y2="480"/>
    <line x1="100" y1="200" x2="300" y2="80"/><line x1="100" y1="200" x2="300" y2="180"/>
    <line x1="100" y1="200" x2="300" y2="280"/><line x1="100" y1="200" x2="300" y2="380"/>
    <line x1="100" y1="200" x2="300" y2="480"/>
    <line x1="100" y1="300" x2="300" y2="80"/><line x1="100" y1="300" x2="300" y2="180"/>
    <line x1="100" y1="300" x2="300" y2="280"/><line x1="100" y1="300" x2="300" y2="380"/>
    <line x1="100" y1="300" x2="300" y2="480"/>
    <line x1="100" y1="400" x2="300" y2="80"/><line x1="100" y1="400" x2="300" y2="180"/>
    <line x1="100" y1="400" x2="300" y2="280"/><line x1="100" y1="400" x2="300" y2="380"/>
    <line x1="100" y1="400" x2="300" y2="480"/>
    <line x1="100" y1="500" x2="300" y2="80"/><line x1="100" y1="500" x2="300" y2="180"/>
    <line x1="100" y1="500" x2="300" y2="280"/><line x1="100" y1="500" x2="300" y2="380"/>
    <line x1="100" y1="500" x2="300" y2="480"/>
    
    <!-- Hidden1 to Hidden2 -->
    <line x1="300" y1="80" x2="500" y2="150"/><line x1="300" y1="80" x2="500" y2="300"/>
    <line x1="300" y1="80" x2="500" y2="450"/>
    <line x1="300" y1="180" x2="500" y2="150"/><line x1="300" y1="180" x2="500" y2="300"/>
    <line x1="300" y1="180" x2="500" y2="450"/>
    <line x1="300" y1="280" x2="500" y2="150"/><line x1="300" y1="280" x2="500" y2="300"/>
    <line x1="300" y1="280" x2="500" y2="450"/>
    <line x1="300" y1="380" x2="500" y2="150"/><line x1="300" y1="380" x2="500" y2="300"/>
    <line x1="300" y1="380" x2="500" y2="450"/>
    <line x1="300" y1="480" x2="500" y2="150"/><line x1="300" y1="480" x2="500" y2="300"/>
    <line x1="300" y1="480" x2="500" y2="450"/>
    
    <!-- Hidden2 to Output -->
    <line x1="500" y1="150" x2="700" y2="200"/><line x1="500" y1="150" x2="700" y2="350"/>
    <line x1="500" y1="150" x2="700" y2="500"/>
    <line x1="500" y1="300" x2="700" y2="200"/><line x1="500" y1="300" x2="700" y2="350"/>
    <line x1="500" y1="300" x2="700" y2="500"/>
    <line x1="500" y1="450" x2="700" y2="200"/><line x1="500" y1="450" x2="700" y2="350"/>
    <line x1="500" y1="450" x2="700" y2="500"/>
  </g>
  
  <!-- Input nodes -->
  <g fill="#6366f1" filter="url(#nnglow)">
    <circle cx="100" cy="100" r="12"/><circle cx="100" cy="200" r="12"/>
    <circle cx="100" cy="300" r="12"/><circle cx="100" cy="400" r="12"/>
    <circle cx="100" cy="500" r="12"/>
  </g>
  
  <!-- Hidden1 nodes -->
  <g fill="#8b5cf6" filter="url(#nnglow)">
    <circle cx="300" cy="80" r="10"/><circle cx="300" cy="180" r="10"/>
    <circle cx="300" cy="280" r="10"/><circle cx="300" cy="380" r="10"/>
    <circle cx="300" cy="480" r="10"/>
  </g>
  
  <!-- Hidden2 nodes -->
  <g fill="#0ea5e9" filter="url(#nnglow)">
    <circle cx="500" cy="150" r="10"/><circle cx="500" cy="300" r="10"/>
    <circle cx="500" cy="450" r="10"/>
  </g>
  
  <!-- Output nodes -->
  <g fill="#06b6d4" filter="url(#nnglow)">
    <circle cx="700" cy="200" r="12"/><circle cx="700" cy="350" r="12"/>
    <circle cx="700" cy="500" r="12"/>
  </g>
  
  <!-- Labels -->
  <g font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">
    <text x="100" y="540">输入层</text>
    <text x="300" y="520">隐藏层1</text>
    <text x="500" y="490">隐藏层2</text>
    <text x="700" y="540">输出层</text>
  </g>
</svg>
