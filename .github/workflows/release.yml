name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without leading v (for example 1.4.1)
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    # Release artifacts are intentionally built only on a controlled runner
    # where C:\KaiwuArtifacts contains the approved offline binaries.
    runs-on: [self-hosted, Windows, kaiwu-release]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Stage approved installers
        shell: powershell
        run: |
          if (-not (Test-Path 'C:\KaiwuArtifacts')) { throw 'Approved artifact store is unavailable' }
          New-Item -ItemType Directory -Path packages\raw -Force | Out-Null
          Copy-Item 'C:\KaiwuArtifacts\*' packages\raw -Force
      - name: Verify every installer
        shell: cmd
        run: verify_installers.bat
      - name: Require Win7 compatibility component
        shell: powershell
        run: |
          if (-not (Test-Path 'packages\raw\KexStepup-setup.exe')) { throw 'Required KexStepup is missing' }
      - name: Run regression tests
        shell: powershell
        run: .\tests\run_tests.ps1
      - name: Build clean package
        shell: cmd
        run: build_zip.bat ${{ inputs.version }}
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: KaiWu Office Suite V${{ inputs.version }}
          files: |
            kaiwu-office-suite-v${{ inputs.version }}.zip
            kaiwu-office-suite-v${{ inputs.version }}.zip.sha256
          draft: true
          fail_on_unmatched_files: true