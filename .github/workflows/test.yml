name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-tests:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - name: Run isolated regression tests
        run: |
          $env:KAIWU_BASE = $env:GITHUB_WORKSPACE
          .\tests\run_tests.ps1
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: tests/TEST_REPORT.md

  static-checks:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python and JSON
        shell: powershell
        run: |
          python -c "import ast,json,pathlib; root=pathlib.Path('.'); [ast.parse(p.read_text(encoding='utf-8-sig'),str(p)) for p in root.rglob('*.py')]; [json.loads(p.read_text(encoding='utf-8-sig')) for p in root.rglob('*.json') if 'results' not in p.parts]; print('static parse OK')"
      - name: Verify missing artifacts fail closed
        shell: powershell
        run: |
          python .\verify_installers.py
          if ($LASTEXITCODE -eq 0) { throw 'Verifier must fail when ignored release artifacts are absent' }
      - name: Check batch line endings
        shell: powershell
        run: |
          $bad = @()
          Get-ChildItem -Recurse -Filter *.bat | ForEach-Object {
            $raw = [IO.File]::ReadAllBytes($_.FullName)
            $text = [Text.Encoding]::GetEncoding(936).GetString($raw)
            if ($text.Contains("`n") -and -not $text.Contains("`r`n")) { $bad += $_.FullName }
            if ($text.Contains("`r`r`n")) { $bad += $_.FullName }
          }
          if ($bad.Count -gt 0) { $bad; throw 'Invalid batch line endings' }

  all-checks:
    runs-on: windows-latest
    if: always()
    needs: [windows-tests, static-checks]
    steps:
      - shell: powershell
        run: |
          if ('${{ needs.windows-tests.result }}' -ne 'success' -or '${{ needs.static-checks.result }}' -ne 'success') {
            throw 'One or more required checks failed'
          }